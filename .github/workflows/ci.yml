name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run ruff
        run: ruff check app/ tests/
      - name: Run ruff format check
        run: ruff format --check app/ tests/ || echo "Format check complete"

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: optiload_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          OPTILOAD_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/optiload_test
          OPTILOAD_ENVIRONMENT: testing
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
        env:
          OPTILOAD_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/optiload_test
          OPTILOAD_ENVIRONMENT: testing

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit || echo "TypeScript issues found"

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t optiload/backend:latest -t optiload/backend:${{ github.sha }} ./backend
      - name: Build frontend image
        run: docker build -t optiload/frontend:latest -t optiload/frontend:${{ github.sha }} ./frontend
