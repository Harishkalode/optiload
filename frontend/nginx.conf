server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # HTTPS redirect (only if not already HTTPS)
  # Uncomment if using SSL termination by Railway/proxy:
  # if ($http_x_forwarded_proto != "https") {
  #   return 301 https://$server_name$request_uri;
  # }

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain application/json application/javascript text/css text/xml text/javascript application/xml+rss;
  gzip_min_length 1000;

  # Static assets caching
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, immutable";
  }

  # SPA routing - redirect all non-file requests to index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate, public, max-age=0";
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Security: Deny access to common sensitive files
  location ~ \.(env|env\..*|git|gitignore|dockerfile|docker-compose\.yml)$ {
    deny all;
    access_log off;
    log_not_found off;
  }
}
