services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-optiload}
      POSTGRES_USER: ${POSTGRES_USER:-optiload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-optiload_secure}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-optiload}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.production
    environment:
      OPTILOAD_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-optiload}:${POSTGRES_PASSWORD:-optiload_secure}@db:5432/${POSTGRES_DB:-optiload}
      OPTILOAD_REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure}@redis:6379/0
      OPTILOAD_ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
      - web
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/meta/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://yourdomain.com/api/v1
    networks:
      - web
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  internal:
    driver: bridge
    internal: true
  web:
    driver: bridge

volumes:
  pgdata:
  redisdata:
