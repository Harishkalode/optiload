# Docker Compose for local development
# Supports both local PostgreSQL and remote Neon DB

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: optiload-postgres
    environment:
      POSTGRES_DB: optiload
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - optiload-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optiload-backend
    environment:
      OPTILOAD_ENVIRONMENT: local
      OPTILOAD_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/optiload
      OPTILOAD_JWT_SECRET_KEY: dev-secret-key-change-in-production-32chars
      OPTILOAD_CORS_ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      OPTILOAD_TRUSTED_HOSTS: '["localhost","127.0.0.1","backend"]'
      OPTILOAD_ALLOW_PUBLIC_REGISTRATION: "true"
      OPTILOAD_RATE_LIMIT_BACKEND: memory
      OPTILOAD_RATE_LIMIT_PER_MINUTE: "100"
      OPTILOAD_AUTH_LOGIN_RATE_LIMIT_PER_MINUTE: "30"
      OPTILOAD_DB_POOL_SIZE: "5"
      OPTILOAD_DB_MAX_OVERFLOW: "10"
      OPTILOAD_LOG_LEVEL: DEBUG
      OPTILOAD_EXPOSE_DETAILED_ERRORS: "true"
      DEMO_MODE: "true"
      OPTILOAD_DEMO_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - optiload-network
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python -m alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: optiload-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - optiload-network
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1

volumes:
  postgres_data:

networks:
  optiload-network:
    driver: bridge

# Alternative configurations:
