# Docker Compose for OptiLoad
# Edit root .env → APP_ENV=local or APP_ENV=production to switch.
# For local: docker compose up
# For production-like testing: docker compose --profile production up

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: optiload-postgres
    environment:
      POSTGRES_DB: optiload
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - optiload-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optiload-backend
    env_file:
      - ./env/.env.development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - optiload-network
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python -m alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: optiload-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - optiload-network

volumes:
  postgres_data:

networks:
  optiload-network:
    driver: bridge
