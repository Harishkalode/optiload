version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: optiload
      POSTGRES_PASSWORD: optiload
      POSTGRES_DB: optiload
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://optiload:optiload@db:5432/optiload
      SECRET_KEY: super-secret-change-me
      SEED_SUPERUSER_EMAIL: owner@optiload.local
      SEED_SUPERUSER_PASSWORD: ChangeMe123!
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
