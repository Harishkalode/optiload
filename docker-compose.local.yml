services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: optiload
      POSTGRES_USER: optiload
      POSTGRES_PASSWORD: optiload
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optiload"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.local
    environment:
      OPTILOAD_DATABASE_URL: postgresql+psycopg2://optiload:optiload@db:5432/optiload
      OPTILOAD_CORS_ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
      OPTILOAD_TRUSTED_HOSTS: '["localhost","127.0.0.1","backend"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
